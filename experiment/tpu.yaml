resources:
  accelerators: tpu-v7e-1 #
  accelerator_args:
    tpu_vm: True
    runtime_version: v2-alpha-tpuv7e # optional

workdir: ~/Program/FUEL-JAX/

file_mounts:
  ~/.ssh/id_rsa: ~/.ssh/id_rsa
  ~/.codex: ~/.codex
setup: |
  chmod 600 ~/.ssh/id_rsa
  rm ~/.ssh/config

run: |
  cd ~/sky_workdir